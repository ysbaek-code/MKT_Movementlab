<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>인스타그램 퍼포먼스 대시보드</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 24px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
      .metric-card { background: #2a2a2a; }
      .chart-box { background: #222; border-color: #333; }
      table th { color: #aaa; border-color: #333; }
      table td { border-color: #333; }
      td input, td select { color: #f0f0f0; }
      .date-tab { border-color: #444; color: #aaa; }
      .date-tab.active { background: #fff; color: #111; border-color: #fff; }
      .week-tab { border-color: #444; color: #aaa; background: #2a2a2a; }
      .week-tab.active { background: #cc2366; color: #fff; border-color: #cc2366; }
      .week-nav-btn { border-color: #444; color: #ccc; background: #2a2a2a; }
      .week-nav-btn:hover { background: #333; }
      .save-btn { border-color: #444; color: #f0f0f0; }
      .save-btn:hover { background: #333; }
      .week-summary { background: #2a2a2a; border-color: #444; }
    }
    .dash { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .ig-icon { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); display: flex; align-items: center; justify-content: center; }
    .ig-icon svg { width: 20px; height: 20px; fill: white; }
    .title { font-size: 20px; font-weight: 600; }
    .subtitle { font-size: 13px; color: #888; }
    .view-tabs { display: flex; gap: 4px; }
    .date-tab { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; transition: all .15s; }
    .date-tab.active { background: #111; color: #fff; border-color: #111; font-weight: 500; }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .metric-card { background: #f0f0f0; border-radius: 10px; padding: 1rem; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
    .metric-card:hover { border-color: #ccc; }
    .metric-card.selected { border-color: #cc2366; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 600; line-height: 1.1; }
    .metric-delta { font-size: 11px; margin-top: 4px; }
    .delta-up { color: #1D9E75; }
    .delta-down { color: #D85A30; }
    .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
    @media (max-width: 600px) { .chart-row { grid-template-columns: 1fr; } }
    .chart-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1rem 1.25rem; }
    .chart-box.full { grid-column: 1 / -1; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .chart-title { font-size: 13px; font-weight: 600; }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .add-row-btn { font-size: 12px; color: #cc2366; background: transparent; border: none; cursor: pointer; padding: 0; font-weight: 500; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; font-size: 13px; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: #888; text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; white-space: nowrap; }
    td { padding: 8px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
    td input { background: transparent; border: none; font-size: 13px; width: 80px; font-family: inherit; outline: none; }
    td input:focus { border-bottom: 1.5px solid #cc2366; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
    .tag-product   { background: #EEEDFE; color: #3C3489; }
    .tag-promo     { background: #E1F5EE; color: #085041; }
    .tag-lifestyle { background: #FAECE7; color: #712B13; }
    .save-btn { font-size: 12px; padding: 6px 16px; border-radius: 8px; border: 1px solid #ccc; background: transparent; cursor: pointer; }
    .save-btn:hover { background: #f0f0f0; }
    .bottom-bar { display: flex; justify-content: flex-end; margin-top: 12px; gap: 8px; }
    .export-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid #cc2366; color: #cc2366; background: transparent; cursor: pointer; }
    .export-btn:hover { background: #fdf0f5; }
    .view-panel { display: none; }
    .view-panel.active { display: block; }
    .week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .week-nav-btn { font-size: 13px; padding: 6px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
    .week-nav-btn:hover { background: #f5f5f5; }
    .week-label { font-size: 14px; font-weight: 600; flex: 1; text-align: center; }
    .week-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .week-tab { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #666; white-space: nowrap; transition: all .15s; }
    .week-tab.active { background: #cc2366; color: #fff; border-color: #cc2366; font-weight: 500; }
    .week-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin-bottom: 1.5rem; background: #f8f8f8; border-radius: 12px; padding: 1rem; border: 1px solid #eee; }
    .week-stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .week-stat-val { font-size: 20px; font-weight: 600; }
    .week-stat-delta { font-size: 11px; margin-top: 2px; }
    .week-compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
    @media (max-width: 600px) { .week-compare-row { grid-template-columns: 1fr; } }
    .no-data { text-align: center; padding: 2rem; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
<div class="dash">

  <div class="header">
    <div class="header-left">
      <div class="ig-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      </div>
      <div>
        <div class="title">인스타그램 퍼포먼스</div>
        <div class="subtitle" id="date-label">전체 데이터</div>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
      <div class="view-tabs">
        <button class="date-tab active" onclick="switchView('overall',this)">전체</button>
        <button class="date-tab" onclick="switchView('weekly',this)">주단위 분석</button>
      </div>
      <button class="save-btn" onclick="exportCSV()">CSV 내보내기</button>
    </div>
  </div>

  <!-- 전체 뷰 -->
  <div id="panel-overall" class="view-panel active">
    <div class="metrics-grid" id="metrics-grid"></div>
    <div class="chart-row">
      <div class="chart-box full">
        <div class="chart-header">
          <span class="chart-title">주요 지표 추이</span>
          <div class="legend" id="chart-legend"></div>
        </div>
        <div style="position:relative;width:100%;height:200px;">
          <canvas id="trendChart" role="img" aria-label="주요 지표 추이 차트"></canvas>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-header"><span class="chart-title">콘텐츠 유형별 비중</span></div>
        <div id="type-legend" class="legend" style="margin-bottom:8px;"></div>
        <div style="position:relative;width:100%;height:160px;">
          <canvas id="typeChart" role="img" aria-label="콘텐츠 유형별 비중 차트"></canvas>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-header"><span class="chart-title">참여 유형 분포</span></div>
        <div style="position:relative;width:100%;height:180px;">
          <canvas id="engageChart" role="img" aria-label="참여 유형 분포 차트"></canvas>
        </div>
      </div>
    </div>
    <div class="chart-box">
      <div class="chart-header">
        <span class="chart-title">게시물 데이터 입력</span>
        <button class="add-row-btn" onclick="addRow()">+ 행 추가</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>날짜</th><th>유형</th><th>콘텐츠 제목</th><th>조회수</th><th>도달계정</th><th>좋아요</th><th>저장</th><th>공유</th><th>프로필방문</th><th>외부링크클릭</th><th>팔로우</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="bottom-bar">
        <button class="export-btn" onclick="exportCSV()">CSV 내보내기</button>
      </div>
    </div>
  </div>

  <!-- 주단위 분석 뷰 -->
  <div id="panel-weekly" class="view-panel">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="prevWeek()">◀ 이전 주</button>
      <span class="week-label" id="week-label">-</span>
      <button class="week-nav-btn" onclick="nextWeek()">다음 주 ▶</button>
    </div>
    <div class="week-tabs" id="week-tabs"></div>
    <div class="week-summary" id="week-summary"></div>
    <div class="week-compare-row">
      <div class="chart-box">
        <div class="chart-header"><span class="chart-title">이번 주 지표 추이</span></div>
        <div style="position:relative;width:100%;height:200px;">
          <canvas id="weekTrendChart" role="img" aria-label="주간 지표 추이"></canvas>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-header"><span class="chart-title">전주 대비 비교</span></div>
        <div style="position:relative;width:100%;height:200px;">
          <canvas id="weekCompareChart" role="img" aria-label="전주 대비 비교 차트"></canvas>
        </div>
      </div>
    </div>
    <div class="chart-box" style="margin-bottom:1rem;">
      <div class="chart-header"><span class="chart-title">콘텐츠 유형별 조회수</span></div>
      <div style="position:relative;width:100%;height:200px;">
        <canvas id="weekTypeChart" role="img" aria-label="주간 콘텐츠 유형별 조회수"></canvas>
      </div>
    </div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const METRICS = [
  { key:'views',        label:'총 조회수',     color:'#cc2366', fmt: v => v>=10000?Math.round(v/1000)+'K':v.toLocaleString() },
  { key:'reach',        label:'도달계정',      color:'#185FA5', fmt: v => v.toLocaleString() },
  { key:'likes',        label:'좋아요',        color:'#A32D2D', fmt: v => v.toLocaleString() },
  { key:'saves',        label:'저장',          color:'#1D9E75', fmt: v => v.toLocaleString() },
  { key:'shares',       label:'공유',          color:'#BA7517', fmt: v => v.toLocaleString() },
  { key:'profile_visit',label:'프로필 방문',   color:'#534AB7', fmt: v => v.toLocaleString() },
  { key:'link_click',   label:'외부링크 클릭', color:'#0E7A6E', fmt: v => v.toLocaleString() },
  { key:'follow',       label:'팔로우',        color:'#C2410C', fmt: v => '+'+v.toLocaleString() },
];
const TYPES = ['제품 큐레이션','프로모션','공간 및 라이프스타일'];
const TYPE_COLORS = ['#cc2366','#185FA5','#BA7517'];

let tableData = [
  { date:'2026-04-28', type:'공간 및 라이프스타일', title:'훌쩍 떠나고픈 이번 주말. 쉬어가는 무브먼트 스테이 4',          views:20593, reach:10626, likes:42,  saves:66,  shares:29, profile_visit:57,  link_click:24,  follow:3  },
  { date:'2026-04-29', type:'공간 및 라이프스타일', title:'제주의 자연 속에서 취향을 마주하며 앉는다는 것',               views:12189, reach:4795,  likes:31,  saves:8,   shares:0,  profile_visit:0,   link_click:0,   follow:0  },
  { date:'2026-04-29', type:'프로모션',             title:'매직볼트 베스트셀러, 세컨드마켓 리퍼브세일 오픈',             views:28024, reach:13036, likes:34,  saves:58,  shares:41, profile_visit:96,  link_click:287, follow:3  },
  { date:'2026-04-30', type:'프로모션',             title:'4월 5주차 온라인 세컨드마켓 NEW IN',                          views:15494, reach:6630,  likes:20,  saves:13,  shares:7,  profile_visit:36,  link_click:17,  follow:0  },
  { date:'2026-04-30', type:'제품 큐레이션',        title:'비건 발효 음식, 차와 와인 모두 즐길 수 있는 퍼멘츠 한남 오픈', views:29658, reach:10917, likes:248, saves:112, shares:88, profile_visit:49,  link_click:1,   follow:14 },
  { date:'2026-05-01', type:'공간 및 라이프스타일', title:'오사카 헤어디자이너의 집에는 어떤 가구가 있을까?',             views:22601, reach:11298, likes:72,  saves:70,  shares:6,  profile_visit:51,  link_click:8,   follow:0  },
  { date:'2026-05-02', type:'제품 큐레이션',        title:'큐브를 조립하듯 자유롭게, 파사드 쉘프 모듈 가이드',           views:14251, reach:6280,  likes:17,  saves:21,  shares:3,  profile_visit:21,  link_click:7,   follow:1  },
  { date:'2026-05-03', type:'제품 큐레이션',        title:'May for Me! 나에게 선물하는 자리 하나',                       views:17775, reach:7675,  likes:42,  saves:64,  shares:20, profile_visit:34,  link_click:6,   follow:0  },
];

let selectedMetric = 'views';
let trendChart, typeChart, engChart, weekTrendChart, weekCompareChart, weekTypeChart;
let currentWeekIdx = 0;

function getWeekStart(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const diff = day===0 ? -6 : 1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

function formatWeekLabel(ws) {
  const s = new Date(ws), e = new Date(ws);
  e.setDate(e.getDate()+6);
  const f = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${s.getFullYear()}년 ${f(s)} ~ ${f(e)}`;
}

function getWeeks() {
  return [...new Set(tableData.map(r=>getWeekStart(r.date)))].sort();
}

function getWeekData(idx) {
  const weeks = getWeeks();
  if (!weeks[idx]) return [];
  const ws = weeks[idx];
  const we = new Date(ws); we.setDate(we.getDate()+6);
  return tableData.filter(r => r.date>=ws && r.date<=we.toISOString().slice(0,10));
}

function calcTotals(data) {
  const t = {};
  METRICS.forEach(m => t[m.key] = (data||tableData).reduce((s,r)=>s+(+r[m.key]||0),0));
  return t;
}

function calcDeltas(data) {
  data = data||tableData;
  const half = Math.floor(data.length/2), d = {};
  METRICS.forEach(m => {
    const r = data.slice(half).reduce((s,row)=>s+(+row[m.key]||0),0);
    const p = data.slice(0,half).reduce((s,row)=>s+(+row[m.key]||0),0);
    d[m.key] = p===0?0:Math.round((r-p)/p*100);
  });
  return d;
}

function renderMetrics() {
  const totals=calcTotals(), deltas=calcDeltas();
  const grid=document.getElementById('metrics-grid'); grid.innerHTML='';
  METRICS.forEach(m => {
    const delta=deltas[m.key], card=document.createElement('div');
    card.className='metric-card'+(selectedMetric===m.key?' selected':'');
    card.innerHTML=`<div class="metric-label">${m.label}</div><div class="metric-value">${m.fmt(totals[m.key])}</div><div class="metric-delta ${delta>=0?'delta-up':'delta-down'}">${delta>=0?'▲':'▼'} ${Math.abs(delta)}%</div>`;
    card.onclick=()=>{ selectedMetric=m.key; renderMetrics(); renderTrendChart(); };
    grid.appendChild(card);
  });
}

function renderTrendChart() {
  const m=METRICS.find(x=>x.key===selectedMetric);
  document.getElementById('chart-legend').innerHTML=`<span class="legend-item"><span class="legend-dot" style="background:${m.color}"></span>${m.label}</span>`;
  if(trendChart) trendChart.destroy();
  trendChart=new Chart(document.getElementById('trendChart'),{
    type:'line',
    data:{labels:tableData.map(r=>r.date.slice(5)),datasets:[{label:m.label,data:tableData.map(r=>+r[m.key]||0),borderColor:m.color,backgroundColor:m.color+'22',fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:m.color}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:11},callback:v=>v>=1000?Math.round(v/1000)+'K':v}}}}
  });
}

function renderTypeChart() {
  const counts={}; TYPES.forEach(t=>counts[t]=0);
  tableData.forEach(r=>{if(counts[r.type]!==undefined)counts[r.type]++;});
  const values=Object.values(counts), total=values.reduce((a,b)=>a+b,0);
  document.getElementById('type-legend').innerHTML=TYPES.map((l,i)=>`<span class="legend-item"><span class="legend-dot" style="background:${TYPE_COLORS[i]}"></span>${l} ${total>0?Math.round(values[i]/total*100):0}%</span>`).join('');
  if(typeChart) typeChart.destroy();
  typeChart=new Chart(document.getElementById('typeChart'),{type:'doughnut',data:{labels:TYPES,datasets:[{data:values,backgroundColor:TYPE_COLORS,borderWidth:2,borderColor:'transparent'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'65%'}});
}

function renderEngageChart() {
  const t=calcTotals();
  if(engChart) engChart.destroy();
  engChart=new Chart(document.getElementById('engageChart'),{type:'bar',data:{labels:['좋아요','저장','공유','프로필방문','링크클릭','팔로우'],datasets:[{data:[t.likes,t.saves,t.shares,t.profile_visit,t.link_click,t.follow],backgroundColor:['#A32D2D','#1D9E75','#BA7517','#534AB7','#0E7A6E','#C2410C'],borderRadius:6,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:11},callback:v=>v>=1000?Math.round(v/1000)+'K':v}},y:{grid:{display:false},ticks:{font:{size:11}}}}}});
}

function renderTable() {
  const tbody=document.getElementById('table-body'); tbody.innerHTML='';
  tableData.forEach((row,i)=>{
    const tc=row.type==='제품 큐레이션'?'tag-product':row.type==='프로모션'?'tag-promo':'tag-lifestyle';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><input value="${row.date}" onchange="updateCell(${i},'date',this.value)" style="width:95px"></td><td><select onchange="updateCell(${i},'type',this.value)" style="background:transparent;border:none;font-size:13px;cursor:pointer;font-family:inherit;outline:none;">${TYPES.map(t=>`<option ${t===row.type?'selected':''}>${t}</option>`).join('')}</select></td><td><input value="${row.title||''}" onchange="updateCell(${i},'title',this.value)" style="width:160px"></td><td><input type="number" value="${row.views}" onchange="updateCell(${i},'views',+this.value)"></td><td><input type="number" value="${row.reach}" onchange="updateCell(${i},'reach',+this.value)"></td><td><input type="number" value="${row.likes}" onchange="updateCell(${i},'likes',+this.value)"></td><td><input type="number" value="${row.saves}" onchange="updateCell(${i},'saves',+this.value)"></td><td><input type="number" value="${row.shares}" onchange="updateCell(${i},'shares',+this.value)"></td><td><input type="number" value="${row.profile_visit||0}" onchange="updateCell(${i},'profile_visit',+this.value)"></td><td><input type="number" value="${row.link_click||0}" onchange="updateCell(${i},'link_click',+this.value)"></td><td><input type="number" value="${row.follow||0}" onchange="updateCell(${i},'follow',+this.value)"></td>`;
    tbody.appendChild(tr);
  });
}

function updateCell(i,key,val){ tableData[i][key]=val; renderAll(); if(key==='type'||key==='date') renderTable(); }
function addRow(){ tableData.push({date:new Date().toISOString().slice(0,10),type:'제품 큐레이션',title:'',views:0,reach:0,likes:0,saves:0,shares:0,profile_visit:0,link_click:0,follow:0}); renderTable(); renderAll(); }

// 주단위 뷰
function renderWeekTabs() {
  const weeks=getWeeks(), container=document.getElementById('week-tabs'); container.innerHTML='';
  weeks.forEach((w,i)=>{
    const btn=document.createElement('button');
    btn.className='week-tab'+(i===currentWeekIdx?' active':'');
    btn.textContent=formatWeekLabel(w);
    btn.onclick=()=>{ currentWeekIdx=i; renderWeekView(); };
    container.appendChild(btn);
  });
}

function renderWeekSummary() {
  const curr=getWeekData(currentWeekIdx), prev=getWeekData(currentWeekIdx-1);
  const ct=calcTotals(curr), pt=calcTotals(prev);
  const container=document.getElementById('week-summary');
  if(!curr.length){container.innerHTML='<div class="no-data">이번 주 데이터가 없습니다.</div>';return;}
  container.innerHTML=METRICS.map(m=>{
    const delta=pt[m.key]>0?Math.round((ct[m.key]-pt[m.key])/pt[m.key]*100):null;
    const dHtml=delta!==null?`<div class="week-stat-delta ${delta>=0?'delta-up':'delta-down'}">${delta>=0?'▲':'▼'} ${Math.abs(delta)}% 전주 대비</div>`:`<div class="week-stat-delta" style="color:#bbb">전주 데이터 없음</div>`;
    return `<div><div class="week-stat-label">${m.label}</div><div class="week-stat-val">${m.fmt(ct[m.key])}</div>${dHtml}</div>`;
  }).join('');
}

function renderWeekTrendChart() {
  const curr=getWeekData(currentWeekIdx);
  if(weekTrendChart) weekTrendChart.destroy();
  if(!curr.length) return;
  const m=METRICS.find(x=>x.key===selectedMetric);
  weekTrendChart=new Chart(document.getElementById('weekTrendChart'),{type:'line',data:{labels:curr.map(r=>r.date.slice(5)),datasets:[{label:m.label,data:curr.map(r=>+r[m.key]||0),borderColor:m.color,backgroundColor:m.color+'22',fill:true,tension:0.4,pointRadius:5,pointBackgroundColor:m.color}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:11},callback:v=>v>=1000?Math.round(v/1000)+'K':v}}}}});
}

function renderWeekCompareChart() {
  const curr=getWeekData(currentWeekIdx), prev=getWeekData(currentWeekIdx-1);
  if(weekCompareChart) weekCompareChart.destroy();
  const keys=['views','likes','saves','shares','profile_visit','link_click'], keyLabels=['조회수','좋아요','저장','공유','프로필방문','링크클릭'];
  const ct=calcTotals(curr), pt=calcTotals(prev);
  const datasets=[{label:'이번 주',data:keys.map(k=>ct[k]||0),backgroundColor:'#cc2366',borderRadius:4,borderSkipped:false}];
  if(prev.length) datasets.push({label:'전주',data:keys.map(k=>pt[k]||0),backgroundColor:'#cccccc',borderRadius:4,borderSkipped:false});
  weekCompareChart=new Chart(document.getElementById('weekCompareChart'),{type:'bar',data:{labels:keyLabels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:10}}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:11},callback:v=>v>=1000?Math.round(v/1000)+'K':v}}}}});
}

function renderWeekTypeChart() {
  const curr=getWeekData(currentWeekIdx);
  if(weekTypeChart) weekTypeChart.destroy();
  if(!curr.length) return;
  const tv={}; TYPES.forEach(t=>tv[t]=0);
  curr.forEach(r=>{if(tv[r.type]!==undefined)tv[r.type]+=(+r.views||0);});
  weekTypeChart=new Chart(document.getElementById('weekTypeChart'),{type:'bar',data:{labels:TYPES,datasets:[{label:'조회수',data:TYPES.map(t=>tv[t]),backgroundColor:TYPE_COLORS,borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:11},callback:v=>v>=1000?Math.round(v/1000)+'K':v}}}}});
}

function renderWeekView() {
  const weeks=getWeeks();
  if(!weeks.length) return;
  currentWeekIdx=Math.max(0,Math.min(currentWeekIdx,weeks.length-1));
  document.getElementById('week-label').textContent=formatWeekLabel(weeks[currentWeekIdx]);
  renderWeekTabs(); renderWeekSummary(); renderWeekTrendChart(); renderWeekCompareChart(); renderWeekTypeChart();
}

function prevWeek(){ if(currentWeekIdx>0){currentWeekIdx--;renderWeekView();} }
function nextWeek(){ const w=getWeeks(); if(currentWeekIdx<w.length-1){currentWeekIdx++;renderWeekView();} }

function switchView(view, btn) {
  document.querySelectorAll('.date-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-overall').classList.toggle('active',view==='overall');
  document.getElementById('panel-weekly').classList.toggle('active',view==='weekly');
  document.getElementById('date-label').textContent=view==='overall'?'전체 데이터':'주단위 분석';
  if(view==='weekly'){ currentWeekIdx=getWeeks().length-1; renderWeekView(); }
}

function renderAll(){ renderMetrics(); renderTrendChart(); renderTypeChart(); renderEngageChart(); }

function exportCSV() {
  const headers=['날짜','유형','콘텐츠 제목','조회수','도달계정','좋아요','저장','공유','프로필방문','외부링크클릭','팔로우'];
  const rows=tableData.map(r=>[r.date,r.type,r.title||'',r.views,r.reach,r.likes,r.saves,r.shares,r.profile_visit||0,r.link_click||0,r.follow||0].join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='instagram_dashboard.csv'; a.click();
}

renderAll();
renderTable();
</script>
</body>
