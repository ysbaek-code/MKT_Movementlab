<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>인스타그램 퍼포먼스 대시보드</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 24px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
      .metric-card { background: #2a2a2a; }
      .chart-box { background: #222; border-color: #333; }
      table th { color: #aaa; border-color: #333; }
      table td { border-color: #333; }
      td input { color: #f0f0f0; }
      .date-tab { border-color: #444; color: #aaa; }
      .date-tab.active { background: #333; color: #f0f0f0; }
      .save-btn { border-color: #444; color: #f0f0f0; }
      .save-btn:hover { background: #333; }
    }
    .dash { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .ig-icon { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); display: flex; align-items: center; justify-content: center; }
    .ig-icon svg { width: 20px; height: 20px; fill: white; }
    .title { font-size: 20px; font-weight: 600; }
    .subtitle { font-size: 13px; color: #888; }
    .date-tabs { display: flex; gap: 4px; }
    .date-tab { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; }
    .date-tab.active { background: #eee; color: #111; border-color: #ccc; font-weight: 500; }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .metric-card { background: #f0f0f0; border-radius: 10px; padding: 1rem; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
    .metric-card:hover { border-color: #ccc; }
    .metric-card.selected { border-color: #cc2366; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 600; line-height: 1.1; }
    .metric-delta { font-size: 11px; margin-top: 4px; }
    .delta-up { color: #1D9E75; }
    .delta-down { color: #D85A30; }
    .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
    @media (max-width: 600px) { .chart-row { grid-template-columns: 1fr; } }
    .chart-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1rem 1.25rem; }
    .chart-box.full { grid-column: 1 / -1; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .chart-title { font-size: 13px; font-weight: 600; }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .add-row-btn { font-size: 12px; color: #cc2366; background: transparent; border: none; cursor: pointer; padding: 0; font-weight: 500; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; font-size: 13px; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: #888; text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; white-space: nowrap; }
    td { padding: 8px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
    td input { background: transparent; border: none; font-size: 13px; width: 80px; font-family: inherit; outline: none; }
    td input:focus { border-bottom: 1.5px solid #cc2366; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .tag-reel  { background: #EEEDFE; color: #3C3489; }
    .tag-post  { background: #E1F5EE; color: #085041; }
    .tag-story { background: #FAECE7; color: #712B13; }
    .save-btn { font-size: 12px; padding: 6px 16px; border-radius: 8px; border: 1px solid #ccc; background: transparent; cursor: pointer; }
    .save-btn:hover { background: #f0f0f0; }
    .bottom-bar { display: flex; justify-content: flex-end; margin-top: 12px; gap: 8px; }
    .export-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid #cc2366; color: #cc2366; background: transparent; cursor: pointer; }
    .export-btn:hover { background: #fdf0f5; }
  </style>
</head>
<body>
<div class="dash">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="ig-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      </div>
      <div>
        <div class="title">인스타그램 퍼포먼스</div>
        <div class="subtitle" id="date-label">최근 7일</div>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
      <div class="date-tabs">
        <button class="date-tab active" onclick="setRange(this,'7일')">7일</button>
        <button class="date-tab" onclick="setRange(this,'30일')">30일</button>
        <button class="date-tab" onclick="setRange(this,'90일')">90일</button>
      </div>
      <button class="save-btn">내보내기</button>
    </div>
  </div>

  <!-- Metric Cards -->
  <div class="metrics-grid" id="metrics-grid"></div>

  <!-- Charts -->
  <div class="chart-row">
    <div class="chart-box full">
      <div class="chart-header">
        <span class="chart-title">주요 지표 추이</span>
        <div class="legend" id="chart-legend"></div>
      </div>
      <div style="position:relative; width:100%; height:200px;">
        <canvas id="trendChart" role="img" aria-label="주요 지표 주간 추이 차트"></canvas>
      </div>
    </div>
    <div class="chart-box">
      <div class="chart-header"><span class="chart-title">콘텐츠 유형별 비중</span></div>
      <div id="type-legend" class="legend" style="margin-bottom:8px;"></div>
      <div style="position:relative; width:100%; height:160px;">
        <canvas id="typeChart" role="img" aria-label="콘텐츠 유형별 비중 차트"></canvas>
      </div>
    </div>
    <div class="chart-box">
      <div class="chart-header"><span class="chart-title">참여 유형 분포</span></div>
      <div style="position:relative; width:100%; height:180px;">
        <canvas id="engageChart" role="img" aria-label="참여 유형 분포 차트"></canvas>
      </div>
    </div>
  </div>

  <!-- Data Table -->
  <div class="chart-box">
    <div class="chart-header">
      <span class="chart-title">게시물 데이터 입력</span>
      <button class="add-row-btn" onclick="addRow()">+ 행 추가</button>
    </div>
    <div class="table-wrap">
      <table id="data-table">
        <thead>
          <tr>
            <th>날짜</th><th>유형</th><th>조회수</th><th>팔로워 증가</th><th>좋아요</th><th>저장</th><th>공유</th><th>댓글</th><th>도달</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="bottom-bar">
      <button class="export-btn" onclick="exportCSV()">CSV 내보내기</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const METRICS = [
  { key:'views',     label:'총 조회수',    color:'#cc2366', fmt: v => v>=10000 ? Math.round(v/1000)+'K' : v.toLocaleString() },
  { key:'followers', label:'팔로워 증가',  color:'#185FA5', fmt: v => '+'+v.toLocaleString() },
  { key:'saves',     label:'저장',         color:'#1D9E75', fmt: v => v.toLocaleString() },
  { key:'shares',    label:'공유',         color:'#BA7517', fmt: v => v.toLocaleString() },
  { key:'likes',     label:'좋아요',       color:'#A32D2D', fmt: v => v.toLocaleString() },
  { key:'comments',  label:'댓글',         color:'#534AB7', fmt: v => v.toLocaleString() },
];

let tableData = [
  { date:'2025-04-29', type:'릴스',   views:42800, followers:312, likes:1840, saves:620, shares:310, comments:88,  reach:38200 },
  { date:'2025-04-30', type:'게시물', views:18500, followers:95,  likes:760,  saves:210, shares:88,  comments:34,  reach:15600 },
  { date:'2025-05-01', type:'릴스',   views:61200, followers:490, likes:2710, saves:940, shares:520, comments:142, reach:55800 },
  { date:'2025-05-02', type:'스토리', views:9800,  followers:42,  likes:320,  saves:88,  shares:44,  comments:12,  reach:8900  },
  { date:'2025-05-03', type:'게시물', views:22400, followers:118, likes:920,  saves:290, shares:130, comments:52,  reach:19200 },
  { date:'2025-05-04', type:'릴스',   views:55600, followers:380, likes:2240, saves:810, shares:440, comments:118, reach:50100 },
];

let selectedMetric = 'views';
let trendChart, typeChart, engChart;

function calcTotals() {
  const t = {};
  METRICS.forEach(m => t[m.key] = tableData.reduce((s,r) => s + (+r[m.key]||0), 0));
  return t;
}

function calcDeltas() {
  const half = Math.floor(tableData.length / 2);
  const d = {};
  METRICS.forEach(m => {
    const r = tableData.slice(half).reduce((s,row) => s+(+row[m.key]||0), 0);
    const p = tableData.slice(0, half).reduce((s,row) => s+(+row[m.key]||0), 0);
    d[m.key] = p === 0 ? 0 : Math.round((r - p) / p * 100);
  });
  return d;
}

function renderMetrics() {
  const totals = calcTotals(), deltas = calcDeltas();
  const grid = document.getElementById('metrics-grid');
  grid.innerHTML = '';
  METRICS.forEach(m => {
    const delta = deltas[m.key];
    const card = document.createElement('div');
    card.className = 'metric-card' + (selectedMetric === m.key ? ' selected' : '');
    card.innerHTML = `
      <div class="metric-label">${m.label}</div>
      <div class="metric-value">${m.fmt(totals[m.key])}</div>
      <div class="metric-delta ${delta >= 0 ? 'delta-up' : 'delta-down'}">${delta >= 0 ? '▲' : '▼'} ${Math.abs(delta)}%</div>
    `;
    card.onclick = () => { selectedMetric = m.key; renderMetrics(); renderTrendChart(); };
    grid.appendChild(card);
  });
}

function renderTrendChart() {
  const labels = tableData.map(r => r.date.slice(5));
  const m = METRICS.find(x => x.key === selectedMetric);
  const data = tableData.map(r => +r[selectedMetric] || 0);
  document.getElementById('chart-legend').innerHTML =
    `<span class="legend-item"><span class="legend-dot" style="background:${m.color}"></span>${m.label}</span>`;
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels, datasets: [{ label: m.label, data, borderColor: m.color, backgroundColor: m.color+'22', fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: m.color }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { font: { size: 11 }, callback: v => v >= 1000 ? Math.round(v/1000)+'K' : v } }
      }
    }
  });
}

function renderTypeChart() {
  const counts = { '릴스': 0, '게시물': 0, '스토리': 0 };
  tableData.forEach(r => { if (counts[r.type] !== undefined) counts[r.type]++; });
  const colors = ['#cc2366','#185FA5','#BA7517'];
  const labels = Object.keys(counts);
  const values = Object.values(counts);
  const total = values.reduce((a,b)=>a+b,0);
  document.getElementById('type-legend').innerHTML = labels.map((l,i)=>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l} ${total>0?Math.round(values[i]/total*100):0}%</span>`
  ).join('');
  if (typeChart) typeChart.destroy();
  typeChart = new Chart(document.getElementById('typeChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: 'transparent' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '65%' }
  });
}

function renderEngageChart() {
  const totals = calcTotals();
  const labels = ['좋아요','저장','공유','댓글'];
  const values = [totals.likes, totals.saves, totals.shares, totals.comments];
  if (engChart) engChart.destroy();
  engChart = new Chart(document.getElementById('engageChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: ['#A32D2D','#1D9E75','#BA7517','#534AB7'], borderRadius: 6, borderSkipped: false }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { font: { size: 11 }, callback: v => v >= 1000 ? Math.round(v/1000)+'K' : v } },
        y: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  tableData.forEach((row, i) => {
    const typeClass = row.type==='릴스' ? 'tag-reel' : row.type==='게시물' ? 'tag-post' : 'tag-story';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input value="${row.date}" onchange="updateCell(${i},'date',this.value)" style="width:95px"></td>
      <td>
        <select onchange="updateCell(${i},'type',this.value)" style="background:transparent;border:none;font-size:13px;cursor:pointer;font-family:inherit;outline:none;">
          ${['릴스','게시물','스토리'].map(t=>`<option ${t===row.type?'selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" value="${row.views}"     onchange="updateCell(${i},'views',+this.value)"></td>
      <td><input type="number" value="${row.followers}" onchange="updateCell(${i},'followers',+this.value)"></td>
      <td><input type="number" value="${row.likes}"     onchange="updateCell(${i},'likes',+this.value)"></td>
      <td><input type="number" value="${row.saves}"     onchange="updateCell(${i},'saves',+this.value)"></td>
      <td><input type="number" value="${row.shares}"    onchange="updateCell(${i},'shares',+this.value)"></td>
      <td><input type="number" value="${row.comments}"  onchange="updateCell(${i},'comments',+this.value)"></td>
      <td><input type="number" value="${row.reach}"     onchange="updateCell(${i},'reach',+this.value)"></td>
    `;
    tbody.appendChild(tr);
  });
}

function updateCell(i, key, val) {
  tableData[i][key] = val;
  renderMetrics(); renderTrendChart(); renderTypeChart(); renderEngageChart();
  if (key === 'type') renderTable();
}

function addRow() {
  tableData.push({ date: new Date().toISOString().slice(0,10), type:'게시물', views:0, followers:0, likes:0, saves:0, shares:0, comments:0, reach:0 });
  renderTable(); renderMetrics(); renderTypeChart(); renderEngageChart();
}

function setRange(btn, label) {
  document.querySelectorAll('.date-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('date-label').textContent = '최근 ' + label;
}

function exportCSV() {
  const headers = ['날짜','유형','조회수','팔로워증가','좋아요','저장','공유','댓글','도달'];
  const rows = tableData.map(r => [r.date, r.type, r.views, r.followers, r.likes, r.saves, r.shares, r.comments, r.reach].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'instagram_dashboard.csv';
  a.click();
}

renderMetrics();
renderTrendChart();
renderTypeChart();
renderEngageChart();
renderTable();
</script>
</body>
</html>
